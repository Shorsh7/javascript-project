<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sitio web destinado a la libre venta de videojuegos y paquetes de los mismos.">
    <meta name="keywords" content="Compras, Videojuegos, Ventas, Online, Email, Login, Juegos, Soulslike, Página web">
    <meta name="author" content="Jorge Fracalossi Martínez">
    <title>S-Team</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <header>
        <h1>S-Team</h1>

        <div class="user-info">
            <p id="welcomeUser"></p>
        </div>

        <nav>
            <div class="nav-left">
                <input
                    type="search"
                    id="searchInput"
                    placeholder="Buscar juego..."
                >

                <select id="categoryFilter">
                    <option value="all">Todos</option>
                    <option value="Soulslike">Soulslike</option>
                    <option value="DLC">DLC</option>
                    <option value="Bundle">Bundle</option>
                    <option value="Action RPG">Action RPG</option>
                    <option value="Hunting">Hunting</option>
                </select>
            </div>

            <div class="nav-right">
                <div class="auth-buttons">
                    <button id="signUpButton">Sign up</button>
                    <button id="loginShortcutButton">Login</button>
                    <button id="logoutButton">Log out</button>
                </div>

                <button id="cartButton">Carrito</button>

            </div>
        </nav>
    </header>

    <main>

        <section id="gamesContainer">
        </section>

        <section id="wishlistSection">
            <h2>Mis favoritos</h2>
            <div id="wishlistContainer"></div>
        </section>

    </main>

    <aside id="cartContainer">
        <h2>Carrito</h2>

        <div id="cartItems"></div>

        <p id="totalPrice">Total: USD 0</p>

        <button id="checkoutButton">
            Finalizar compra
        </button>

        <button id="clearCartButton">
            Vaciar Carrito
        </button>

    </aside>

    <section id="addGameSection">
        <h2>Agregar videojuego</h2>

        <input type="text" id="gameName" placeholder="Nombre">
        <input type="number" id="gamePrice" placeholder="Precio">
        <input type="text" id="gameDescription" placeholder="Descripción">
        <input type="number" id="gameYear" placeholder="Año">
        <input type="text" id="gameDev" placeholder="Desarrollador">
        <input type="text" id="gameGenre" placeholder="Género">
        <input type="text" id="gameImage" placeholder="Ruta de imagen">

        <button id="addGameButton">
            Agregar juego
        </button>
    </section>

    <script type="module" src="./js/main.js"></script>

</body>
</html>
