<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sitio web destinado a la libre venta de videojuegos y paquetes de los mismos.">
    <meta name="keywords" content="Compras, Videojuegos, Ventas, Online, Email, Login, Juegos, Soulslike, Página web">
    <meta name="author" content="Jorge Fracalossi Martínez">
    <title>S-Team</title>
    <link rel="icon" type="image/png" href="./img/s-team-logo.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <header>
        
        <div class="top-header">

            <div class="logo-container">
                <img
                    src="./img/logo.png"
                    alt="S-Team Logo"
                    id="siteLogo"
                >
            </div>

            <div class="user-info">
                <p id="welcomeUser"></p>
            </div>

        </div>

        <nav>
            <div class="nav-left">

                
                <input
                    type="search"
                    id="searchInput"
                    placeholder="Buscar juego..."
                >

                <select id="categoryFilter">
                    <option value="all">All</option>
                    <option value="Soulslike">Soulslike</option>
                    <option value="DLC">DLC</option>
                    <option value="Bundle">Bundle</option>
                    <option value="Dark Fantasy">Dark Fantasy</option>
                    <option value="Hunting">Hunting</option>
                    <option value="Hard">Hard</option>
                    <option value="Role">Role</option>
                    <option value="Mechas">Mechas</option>
                    <option value="Action">Action</option>
                    <option value="Coop">Cooperativo</option>
                    <option value="Girl Protagonist">Protagonista Femenino</option>
                    <option value="RPG">RPG</option>
                    <option value="Shooter">Disparos</option>
                    <option value="Open World">Mundo Abierto</option>
                </select>
            </div>
            

            <div class="nav-right">
                <div class="auth-buttons">
                    <button id="signUpButton">Sign up</button>
                    <button id="loginShortcutButton">Login</button>
                    <button id="logoutButton">Log out</button>
                </div>

                <button id="wishlistButton">Favoritos</button>
                
                <div id="wishlistDropdown">
                    <div id="wishlistContainer"></div>

                    <button id="clearWishlistButton">
                        Vaciar favoritos
                    </button>
                </div>

                <button id="cartButton">Carrito</button>

                <div id="cartDropdown">
                    <div id="cartItems"></div>

                    <p id="totalPrice">
                        Total: USD 0
                    </p>

                    <button id="checkoutButton">
                        Finalizar compra
                    </button>

                    <button id="clearCartButton">
                        Vaciar carrito
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <section id="gamesContainer">
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/main.js"></script>

</body>
</html>
