<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrate en nuestro sitio y accedé a beneficios exclusivos de usuarios registrados. Hacé una lista de tus favoritos y recibí notificaciones de ofertas o nuevos ingresos.">
    <meta name="keywords" content="Compras, Videojuegos, Ventas, Online, Email, Login, Juegos, Soulslike, Página web, Ofertas, Ingresos">
    <meta name="author" content="Jorge Fracalossi Martínez">
    <title>Login - S-Team</title>
    <link rel="icon" type="image/png" href="./img/steam_favicon.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <main class="auth-container">
        <section id="loginSection">
            <h2>INICIAR SESIÓN</h2>

            <input
                type="text"
                id="loginEmail"
                autocomplete="off"
                placeholder="Usuario o Correo electrónico"
            >

            <input
                type="password"
                id="loginPassword"
                autocomplete="off"
                placeholder="Contraseña"
            >

            <button id="loginButton" type="button">
                Iniciar sesión
            </button>

            <p>
                ¿No tenés cuenta?
                <a href="./register.html">
                    Registrate
                </a>
            </p>
        </section>
    </main>

    <div id="loaderScreen" aria-hidden="true">
        <div class="scanlines"></div>
        <div class="loader-content">
            <img height="" width=""
                src="./img/s-team-logo.png"
                alt="S-Team Loader"
                id="loaderLogo"
            >
            <h2 class="loader-title" id="loaderText">
                LOADING
            </h2>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/login.js"></script>

</body>
</html>
