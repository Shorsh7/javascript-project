<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrate en nuestro sitio y accedé a beneficios exclusivos de usuarios registrados. Hacé una lista de tus favoritos y recibí notificaciones de ofertas o nuevos ingresos.">
    <meta name="keywords" content="Compras, Videojuegos, Ventas, Online, Email, Login, Juegos, Soulslike, Página web, Ofertas, Ingresos">
    <meta name="author" content="Jorge Fracalossi Martínez">
    <title>Registro - S-Team</title>
    <link rel="icon" type="image/png" href="./img/steam_favicon.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <main class="auth-container">
        <section id="registerSection">
            <h2>CREAR CUENTA</h2>

            <input
                type="text"
                id="registerUsername"
                placeholder="Nombre de usuario"
            >

            <input
                type="email"
                id="registerEmail"
                placeholder="Correo electrónico"
            >

            <input
                type="password"
                id="registerPassword"
                placeholder="Contraseña"
            >

            <button id="registerButton">
                Registrarse
            </button>

            <p>
                ¿Ya tenés cuenta?
                <a href="./login.html">
                    Iniciar sesión
                </a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/register.js"></script>

</body>
</html>
